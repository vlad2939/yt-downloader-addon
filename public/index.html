<!doctype html>
<html lang="ro" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Downloader</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Fonts and Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="style.css" rel="stylesheet">

  <!-- Marked.js for parsing Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

</head>
<body class="min-h-screen bg-slate-50 dark:bg-[#0A0C10] text-slate-900 dark:text-slate-200 font-sans selection:bg-orange-500/30 flex flex-col relative transition-colors duration-300 overflow-x-hidden">
  
  <!-- Ambient background elements for glassmorphism -->
  <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-orange-400/20 dark:bg-orange-600/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-400/20 dark:bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Header -->
  <header class="flex justify-between items-center px-6 py-6 w-full max-w-7xl mx-auto z-10 transition-all">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-tr from-orange-500 to-amber-400 rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-500/20">
        <span class="material-icons" style="font-size: 20px;">download</span>
      </div>
      <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">YT_Downloader</h1>
    </div>
    
    <button id="themeToggleBtn" class="p-2.5 rounded-xl bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl border border-slate-200/50 dark:border-slate-700/50 text-slate-500 dark:text-slate-400 hover:text-orange-500 dark:hover:text-orange-400 transition-colors shadow-sm focus:outline-none focus:ring-4 focus:ring-orange-500/10">
      <span class="material-icons block text-xl" id="themeIcon">light_mode</span>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-start gap-10 px-4 py-6 md:py-12 mx-auto w-full max-w-5xl z-10">
    <div class="w-full max-w-3xl text-center space-y-4">
      <h2 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white tracking-tight">Descarcă orice video <br class="hidden sm:block"/>din YouTube.</h2>
      <p class="text-slate-500 dark:text-slate-400 text-lg max-w-2xl mx-auto font-medium">Suportă rezoluții multiple, inclusiv 4K. <span class="text-orange-600 dark:text-orange-400 font-semibold">Simplu, rapid și curat.</span></p>
    </div>

    <!-- Search Box -->
    <div class="w-full max-w-2xl relative group mx-auto mt-4">
      <div class="relative flex items-center shadow-xl shadow-slate-200/50 dark:shadow-black/50 rounded-2xl bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl border border-slate-200/80 dark:border-slate-700/60 transition-all p-1.5 focus-within:ring-4 focus-within:ring-orange-500/20 focus-within:border-orange-500/50">
        <span class="material-icons absolute left-5 text-slate-400 dark:text-slate-500 pointer-events-none">link</span>
        <input 
          type="text" 
          id="urlInput"
          placeholder="Lipește linkul YouTube aici..." 
          class="w-full bg-transparent h-14 pl-14 pr-32 md:pr-40 text-slate-800 dark:text-slate-100 text-base font-medium focus:outline-none placeholder-slate-400 dark:placeholder-slate-500"
        />
        <button 
          id="searchBtn"
          class="absolute right-1.5 top-1.5 bottom-1.5 px-6 bg-orange-600 dark:bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-500 dark:hover:bg-orange-400 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 transition-all text-sm tracking-wide shadow-md shadow-orange-500/20"
        >
          <span id="searchBtnIcon" class="material-icons text-[18px] hidden animate-spin">autorenew</span>
          <span id="searchBtnText">Caută</span>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div id="errorContainer" class="hidden w-full max-w-2xl mx-auto p-4 bg-orange-50 dark:bg-orange-500/10 border border-orange-200 dark:border-orange-500/20 text-orange-600 dark:text-orange-400 rounded-2xl items-center gap-3 backdrop-blur-md transition-all shadow-sm">
      <span class="material-icons">error_outline</span>
      <p id="errorText" class="font-semibold text-sm"></p>
    </div>

    <!-- Video Info Container -->
    <div id="videoInfoContainer" class="hidden grid-cols-1 md:grid-cols-12 gap-8 w-full max-w-6xl">
      <!-- Left: Thumbnail & basic info -->
      <div class="col-span-1 md:col-span-7 bg-white/70 dark:bg-slate-900/60 backdrop-blur-xl rounded-3xl border border-slate-200/80 dark:border-slate-800/80 p-4 shadow-xl shadow-slate-200/40 dark:shadow-none self-start flex flex-col gap-4">
        <div class="aspect-video bg-slate-100 dark:bg-slate-800 rounded-2xl overflow-hidden relative shadow-sm">
          <img id="videoThumb" src="" alt="Thumbnail" class="w-full h-full object-cover transition-transform duration-700 hover:scale-105" referrerpolicy="no-referrer" />
        </div>
        <div class="flex flex-col gap-1 px-2 pb-2">
          <span class="text-[10px] uppercase tracking-widest text-orange-600 dark:text-orange-500 font-bold">Informații Video</span>
          <h3 id="videoTitle" class="text-base text-slate-800 dark:text-slate-100 font-bold leading-snug line-clamp-3"></h3>
        </div>
      </div>
      
      <!-- Right: Formats -->
      <div class="col-span-1 md:col-span-5 flex flex-col">
        <div class="px-2 mb-3 mt-1 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Formate disponibile</div>
        <div id="formatsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 flex-1 pb-4">
          <!-- Formats will be injected here -->
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="w-full text-center py-8 mt-auto z-10 transition-all">
    <button id="readmeBtn" class="text-sm font-semibold text-slate-400 hover:text-orange-600 dark:hover:text-orange-500 transition-colors focus:outline-none">
      @ concept și realizare vlad39
    </button>
  </footer>

  <!-- README Popup (Modal) -->
  <div id="readmeModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center p-4 sm:p-6 opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="absolute inset-0 bg-slate-900/60 dark:bg-slate-950/80 backdrop-blur-sm transition-opacity" id="readmeBackdrop"></div>
    <div class="relative w-full max-w-3xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-2xl flex flex-col max-h-[85vh] overflow-hidden transform scale-95 transition-transform duration-300" id="readmeContentPanel">
      
      <div class="flex justify-between items-center p-5 md:p-6 border-b border-slate-100 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md z-10">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-orange-100 dark:bg-orange-500/20 text-orange-600 dark:text-orange-500 flex items-center justify-center">
            <span class="material-icons text-xl">description</span>
          </div>
          <h3 class="font-bold text-slate-900 dark:text-white text-lg md:text-xl tracking-tight">Despre Aplicație</h3>
        </div>
        <button id="closeReadmeBtn" class="text-slate-400 hover:text-orange-600 dark:hover:text-orange-400 transition-colors bg-slate-100 dark:bg-slate-800 hover:bg-orange-50 dark:hover:bg-slate-700 p-2 rounded-full focus:outline-none">
          <span class="material-icons text-base block">close</span>
        </button>
      </div>
      
      <div class="p-6 overflow-y-auto prose dark:prose-invert prose-orange max-w-none text-sm md:text-base prose-headings:font-bold prose-a:text-orange-600 dark:prose-a:text-orange-500" id="readmeMarkdownContent">
        <!-- Markdown injected here -->
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
